# NAS(Synology/QNAP 등)에서 ETF 추천·분석 앱 실행
# 사용:  docker compose up -d --build
#
# - ./data 폴더가 컨테이너의 /data 로 연결되어, 회원·즐겨찾기 DB가 NAS에 영구 저장됩니다.
# - SECRET_KEY 는 로그인 세션 서명용. 반드시 아무도 모르는 긴 무작위 문자열로 바꾸세요.
# - 폰/PC에서  http://<NAS_IP>:8000  으로 접속.
services:
  etf:
    build: .
    image: etf-recommender
    container_name: etf-recommender
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - SECRET_KEY=여기에-아주-긴-무작위-문자열-넣기
      # 마스터(관리자) 이메일. 이 이메일로 가입하면 자동 승인·관리자가 되고,
      # 다른 사람이 가입하면 관리자가 승인해야 사용할 수 있습니다.
      - ADMIN_EMAIL=내이메일@example.com
    restart: unless-stopped
