# Render 무료 배포 설정 (https://render.com).
# GitHub 저장소를 연결하면 이 파일을 읽어 자동으로 빌드·실행한다.
services:
  - type: web
    name: etf-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # 로그인 세션 서명키. sync:false 라서 깃에 저장되지 않고 대시보드에서 입력.
      # (계정·즐겨찾기는 회원가입 방식. 단, Render 무료는 영구 디스크가 없어
      #  재배포 시 DB가 초기화될 수 있음 — 계정 저장이 중요하면 NAS 실행 권장.)
      - key: SECRET_KEY
        sync: false
      # 마스터(관리자) 이메일. 이 이메일로 가입하면 자동 승인·관리자.
      - key: ADMIN_EMAIL
        sync: false
